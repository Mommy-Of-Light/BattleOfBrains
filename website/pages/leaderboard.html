<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Of Brains | Leaderboard</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5 text-center">
                        <span class="badge text-bg-primary rounded-pill mb-3">Battle Of Brains</span>
                        <h1 class="display-6 fw-bold mb-3">Leaderboard</h1>
                        <p class="text-muted mb-4">Top players</p>

                        <div class="table-responsive mb-4">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th scope="col">#</th>
                                        <th scope="col">Player</th>
                                        <th scope="col">Score</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboardBody">
                                    <!-- Leaderboard rows injected here -->
                                </tbody>
                            </table>
                        </div>

                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <button id="backToRooms" type="button" class="btn btn-outline-secondary btn-lg px-4">Back</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/main.js"></script>
</body>
</html>
